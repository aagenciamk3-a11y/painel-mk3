<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>MK3 — Painel de Prazos</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --txt:#e6e8ec; --mut:#8b909c; --roxo:#a78bfa;
    --atrasado:#e5484d; --hoje:#ff8a3d; --umdia:#f5c518;
    --semana:#4c9aff; --futuro:#6e7481; --ok:#3fb950; --sem:#a855f7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);line-height:1.5;padding:32px 24px 80px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif}
  .wrap{max-width:1180px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px}
  h1{font-size:22px;letter-spacing:-.02em}
  h1 span{color:var(--mut);font-weight:400}
  .hoje{font-size:13px;color:var(--mut)}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin:36px 0 14px;font-weight:600}

  /* ---- barra de áreas (filtro do topo) ---- */
  .areas{display:flex;gap:8px;margin-bottom:26px;flex-wrap:wrap}
  .areabtn{background:var(--panel);border:1px solid var(--line);color:var(--mut);font:inherit;
    font-size:14px;font-weight:600;padding:10px 20px;border-radius:11px;cursor:pointer;transition:.12s}
  .areabtn:hover{color:var(--txt);border-color:var(--mut)}
  .areabtn.on{background:var(--semana);border-color:var(--semana);color:#fff}

  /* ---- toggle de modos na home (ver todos os clientes) ---- */
  .modos{display:inline-flex;gap:2px;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;padding:3px;margin-bottom:22px}
  .modos button{background:none;border:none;color:var(--mut);font:inherit;font-size:13px;font-weight:600;
    padding:8px 18px;border-radius:8px;cursor:pointer}
  .modos button:hover{color:var(--txt)}
  .modos button.on{background:var(--panel2);color:var(--txt)}

  /* ---- home: cards de cliente ---- */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .ccard{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;cursor:pointer;text-align:left;color:inherit;font:inherit;padding:0;transition:.14s}
  .ccard:hover{border-color:var(--mut);transform:translateY(-2px)}
  .ccard-banner{height:84px;width:100%}
  .ccard-av,.cli-av2{position:relative;overflow:hidden}
  .ccard-av img,.cli-av2 img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .ccard-av{position:absolute;top:50px;left:18px;width:64px;height:64px;border-radius:16px;
    display:grid;place-items:center;font-size:21px;font-weight:700;color:#fff;
    border:3px solid var(--panel);letter-spacing:.02em}
  .ccard-body{padding:24px 18px 18px}
  .ccard-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:6px}
  .ccard-top h3{font-size:18px;letter-spacing:-.01em}
  .badge-ativo{background:rgba(167,139,250,.16);color:var(--roxo);font-size:11px;font-weight:600;
    padding:3px 11px;border-radius:20px;white-space:nowrap}
  .seg{display:inline-block;background:var(--panel2);border:1px solid var(--line);color:var(--mut);
    font-size:11px;font-weight:600;padding:3px 11px;border-radius:8px;margin-top:9px}
  .ccard-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
  .stat{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);
    border-radius:9px;padding:9px 11px;font-size:12.5px;font-weight:600;color:var(--mut)}
  .stat i{width:8px;height:8px;border-radius:50%;flex:none}
  .stat b{color:var(--txt)}
  .s-atrasado i{background:var(--atrasado)} .s-atrasado b{color:var(--atrasado)}
  .s-hoje i{background:var(--hoje)}         .s-hoje b{color:var(--hoje)}
  .s-semana i{background:var(--semana)}     .s-semana b{color:var(--semana)}
  .s-ok i{background:var(--ok)}             .s-ok b{color:var(--ok)}

  /* ---- barra do cliente aberto ---- */
  .cli-bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .voltar{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:9px;
    padding:9px 13px;font:inherit;font-size:13px;cursor:pointer}
  .voltar:hover{border-color:var(--semana);color:var(--semana)}
  .cli-title{display:flex;align-items:center;gap:11px;font-size:19px;font-weight:600}
  .cli-av2{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:#fff;
    font-weight:700;font-size:13px}
  .cli-tabs{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
  .cli-tabs button{background:none;border:none;color:var(--mut);font:inherit;font-size:14px;font-weight:500;
    padding:9px 15px;border-radius:9px;cursor:pointer}
  .cli-tabs button:hover{color:var(--txt)}
  .cli-tabs button.on{background:var(--panel2);color:var(--txt)}

  /* ---- semáforo (dentro de Tarefas) ---- */
  .semaforo{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .sf{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;
    border-left:3px solid var(--futuro);cursor:pointer;transition:.12s;position:relative}
  .sf:hover{background:var(--panel2)}
  .sf.on{background:var(--panel2)}
  .sf.on::after{content:"\2713";position:absolute;top:9px;right:11px;font-size:11px;color:var(--mut)}
  .sf b{display:block;font-size:28px;line-height:1.1;font-weight:600}
  .sf small{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut)}
  .sf.atrasado{border-left-color:var(--atrasado)} .sf.atrasado b{color:var(--atrasado)}
  .sf.hoje{border-left-color:var(--hoje)}         .sf.hoje b{color:var(--hoje)}
  .sf.umdia{border-left-color:var(--umdia)}       .sf.umdia b{color:var(--umdia)}
  .sf.semana{border-left-color:var(--semana)}     .sf.semana b{color:var(--semana)}
  .sf.sem{border-left-color:var(--sem)}           .sf.sem b{color:var(--sem)}
  .sf.ok{border-left-color:var(--ok)}             .sf.ok b{color:var(--ok)}

  /* ---- listas de tarefa ---- */
  .fila{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .row{display:grid;grid-template-columns:120px 1fr 132px 96px;gap:14px;align-items:center;
    padding:13px 16px;border-top:1px solid var(--line);font-size:14px}
  .row:first-child{border-top:none}
  .row:hover{background:var(--panel2)}
  .tag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 7px;
    border-radius:5px;text-align:center;white-space:nowrap}
  .t-atrasado{background:rgba(229,72,77,.15);color:var(--atrasado)}
  .t-hoje{background:rgba(255,138,61,.15);color:var(--hoje)}
  .t-umdia{background:rgba(245,197,24,.15);color:var(--umdia)}
  .t-semana{background:rgba(76,154,255,.15);color:var(--semana)}
  .t-futuro{background:rgba(110,116,129,.15);color:var(--futuro)}
  .t-sem{background:rgba(168,85,247,.15);color:var(--sem)}
  .t-ok{background:rgba(63,185,80,.15);color:var(--ok)}
  .tag.okatraso{background:rgba(245,197,24,.16);color:var(--umdia)}
  .tarefa{font-weight:500}
  .tarefa em{display:block;font-style:normal;font-size:12px;color:var(--mut);margin-top:2px}
  .data{color:var(--mut);font-size:13px;font-variant-numeric:tabular-nums}
  .dow{color:#5d626d;font-size:11px}
  .resp{color:var(--mut);font-size:12px}
  .row.rowc{grid-template-columns:120px 1fr 140px 132px 96px}
  .cli{color:var(--mut);font-size:13px}

  /* ---- calendário ---- */
  .cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .cal-nav strong{font-size:16px;text-transform:capitalize;min-width:190px}
  .cal-nav button{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;
    width:32px;height:32px;cursor:pointer;font-size:15px;line-height:1}
  .cal-nav button:hover{border-color:var(--semana);color:var(--semana)}
  .cal-nav .hj{width:auto;padding:0 12px;font:inherit;font-size:12px;color:var(--mut)}
  .cal{background:transparent;border:none;overflow:visible}
  .cal-dow{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-bottom:8px;padding:0 2px}
  .cal-dow div{text-align:left;font-size:10px;text-transform:uppercase;
    letter-spacing:.09em;color:var(--mut);font-weight:700;min-width:0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}
  .cel{min-width:0;overflow:hidden;min-height:122px;background:var(--panel);
    border:1px solid var(--line);border-radius:9px;
    padding:7px;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:.12s}
  .cel:hover{border-color:var(--mut)}
  .cel.fds{background:rgba(255,255,255,.015)}
  .cel.fora{background:rgba(255,255,255,.01);border-color:rgba(42,47,58,.5)}
  .cel.sel{box-shadow:0 0 0 2px var(--semana);border-color:var(--semana)}
  .cel .n{display:flex;align-items:center;justify-content:center;width:24px;height:24px;
    font-size:13px;font-weight:600;color:var(--txt);font-variant-numeric:tabular-nums;
    border-radius:50%;flex:none}
  .cel.fora .n{color:#4a4f5a;font-weight:400}
  .cel.fora .ev,.cel.fora .mais{opacity:.4}
  .cel.hj .n{background:var(--semana);color:#fff;font-weight:700}
  .ev{min-width:0;max-width:100%;background:var(--panel2);border-left:3px solid var(--futuro);
    border-radius:5px;padding:4px 7px 5px;margin-bottom:3px;overflow:hidden;cursor:pointer}
  .ev-tt{font-size:10.5px;font-weight:600;line-height:1.25;color:var(--txt);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev-meta{display:flex;align-items:center;gap:5px;margin-top:2px;font-size:9px;color:var(--mut);
    text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev-dot{width:6px;height:6px;border-radius:50%;flex:none;background:var(--futuro)}
  .ev-atrasado{border-left-color:var(--atrasado);background:rgba(229,72,77,.10)} .ev-atrasado .ev-dot{background:var(--atrasado)}
  .ev-hoje{border-left-color:var(--hoje);background:rgba(255,138,61,.10)}       .ev-hoje .ev-dot{background:var(--hoje)}
  .ev-umdia{border-left-color:var(--umdia);background:rgba(245,197,24,.10)}     .ev-umdia .ev-dot{background:var(--umdia)}
  .ev-semana{border-left-color:var(--semana);background:rgba(76,154,255,.10)}   .ev-semana .ev-dot{background:var(--semana)}
  .ev-futuro{border-left-color:var(--futuro);background:var(--panel2)}
  .ev-sem{border-left-color:var(--sem);background:rgba(168,85,247,.10)}         .ev-sem .ev-dot{background:var(--sem)}
  .ev-ok{border-left-color:var(--ok);background:rgba(63,185,80,.10)}            .ev-ok .ev-dot{background:var(--ok)}
  .ev-marco{border-left-color:var(--ok);background:rgba(63,185,80,.16)}         .ev-marco .ev-dot{background:var(--ok)}
  .cel.fora .ev{opacity:.45}
  .mais{font-size:10px;color:var(--mut);padding-left:5px;margin-top:2px}
  .calDia{margin-top:18px}

  /* ---- histórico ---- */
  .hist{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:24px 26px}
  .hist ol{list-style:none;position:relative;padding-left:26px}
  .hist ol::before{content:"";position:absolute;left:5px;top:7px;bottom:7px;width:2px;background:var(--line)}
  .hist li{position:relative;padding-bottom:20px}
  .hist li:last-child{padding-bottom:0}
  .hist li::before{content:"";position:absolute;left:-26px;top:5px;width:12px;height:12px;border-radius:50%;
    background:var(--bg);border:2px solid var(--futuro)}
  .hist li.feito::before{background:var(--ok);border-color:var(--ok)}
  .hist li.hj::before{background:var(--hoje);border-color:var(--hoje);box-shadow:0 0 0 4px rgba(255,138,61,.18)}
  .hist .qd{font-size:11px;color:var(--mut);text-transform:capitalize}
  .hist .tt{font-weight:600;font-size:14px}
  .hist .dt{font-size:12px;color:var(--mut)}
  .hist .prev{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--futuro);
    border:1px solid var(--line);border-radius:4px;padding:1px 5px;margin-left:7px}

  /* ---- atrasos ---- */
  .atr{display:grid;grid-template-columns:1fr 108px 108px 96px 88px;gap:14px;align-items:center;
    padding:13px 16px;border-top:1px solid var(--line);font-size:14px}
  .atr:first-child{border-top:none}
  .atr .etapa{font-weight:500}
  .atr .etapa em{display:block;font-style:normal;font-size:12px;color:var(--mut);margin-top:2px}
  .atr .n{font-weight:700;color:var(--atrasado);text-align:right;font-variant-numeric:tabular-nums}
  .quem{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    padding:4px 7px;border-radius:5px;text-align:center}
  .q-MK3{background:rgba(229,72,77,.15);color:var(--atrasado)}
  .q-Cliente{background:rgba(245,197,24,.15);color:var(--umdia)}
  .atr.prev{background:rgba(245,197,24,.05)} .atr.prev .n{color:var(--umdia)}
  .badge-prev{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
    background:rgba(245,197,24,.18);color:var(--umdia);padding:2px 6px;border-radius:4px;margin-left:7px}
  .atr.just{opacity:.72} .atr.just .n{color:var(--mut)}
  .badge-just{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
    background:rgba(139,144,156,.16);color:var(--mut);padding:2px 6px;border-radius:4px;margin-left:7px}
  .ok-prazo{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 22px;
    font-size:14px;color:var(--ok)}

  .vazio{background:var(--panel);border:1px dashed var(--line);border-radius:10px;padding:22px;
    color:var(--mut);font-size:14px}
  footer{margin-top:48px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--mut)}
  @media(max-width:760px){
    .row{grid-template-columns:110px 1fr;row-gap:6px}
    .row .data,.row .resp{grid-column:2}
    .cli-tabs{margin-left:0;width:100%}
    .cel{min-height:88px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>MK3 <span>· Painel de Prazos</span></h1>
    <div class="hoje" id="hoje"></div>
  </header>

  <div class="areas" id="areas"></div>
  <div id="view"></div>

  <footer>
    Regras do Manual de Processos Internos MK3 v1.0. Prazos de aprovação e produção contam
    <strong>dias úteis</strong>. Status recalculados a cada abertura da página.
  </footer>
</div>

<script src="dados.js"></script>
<script src="motor.js"></script>
</body>
</html>
